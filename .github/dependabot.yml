version: 2
updates:
- package-ecosystem: maven
  directories:
    - "/ch01/java"
    - "/ch02/java"
    - "/ch04/java"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: gradle
  directories:
    - "/ch04/java"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: npm
  directories:
    - "/ch01/javascript/anthropic-claude-basic"
    - "/ch01/javascript/google-gemini-basic"
    - "/ch01/javascript/openai-gpt-basic"
    - "/ch02/javascript/anthropic-claude-system-prompt"
    - "/ch02/javascript/google-gemini-system-prompt"
    - "/ch02/javascript/openai-gpt-system-prompt"
    - "/ch04/javascript/function_calling"
    - "/ch04/javascript/mcp_server"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99
